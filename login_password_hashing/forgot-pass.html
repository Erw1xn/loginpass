<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>forgot password</title>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: radial-gradient(circle at top left, #2e1a47, #1a1a2e, #2e3a59);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      overflow: hidden;
    }

    .form-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px 30px;
      border-radius: 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .input-group {
      position: relative;
      margin-bottom: 25px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.5);
      display: flex;
      align-items: center;
    }

    .input-group ion-icon {
      font-size: 18px;
      margin-right: 10px;
      color: #fff;
    }

    .input-group input {
      width: 100%;
      background: none;
      border: none;
      outline: none;
      padding: 10px 0;
      color: #fff;
      font-size: 14px;
    }

    .input-group input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    .toggle-password {
      cursor: pointer;
      position: absolute;
      right: 0;
    }

    #message {
      font-size: 11px;
      margin-top: -15px;
      margin-bottom: 15px;
      min-height: 14px;
      text-align: center;
    }

    .error { color: #ff512f; }
    .success { color: #00ff88; }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(to right, #ff512f, #dd2476); 
      color: white;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:disabled {
      background: #555;
      cursor: not-allowed;
      opacity: 0.5;
    }

    button:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .switch-link {
      margin-top: 20px;
      font-size: 12px;
      text-align: center;
    }

    .switch-link a {
      color: #4facfe;
      text-decoration: none;
      font-weight: bold;
    }

    /* Keep text white during autofill */
    input:-webkit-autofill {
      -webkit-background-clip: text;
      -webkit-text-fill-color: #ffffff !important;
      transition: background-color 5000s ease-in-out 0s;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <form id="forgot-password-form">
      <h2>Reset Password</h2>
      
      <div class="input-group">
        <ion-icon name="mail-outline"></ion-icon>
        <input type="email" id="forgot-email" placeholder="Email Address" required>
      </div>
      
      <div class="input-group">
        <ion-icon name="lock-closed-outline"></ion-icon>
        <input type="password" id="new-password" placeholder="New Password" required maxlength="20">
        <span class="toggle-password" data-target="new-password">
          <ion-icon name="eye-off-outline"></ion-icon>
        </span>
      </div>
      
      <div class="input-group">
        <ion-icon name="shield-checkmark-outline"></ion-icon>
        <input type="password" id="confirm-password" placeholder="Confirm New Password" required maxlength="20">
        <span class="toggle-password" data-target="confirm-password">
          <ion-icon name="eye-off-outline"></ion-icon>
        </span>
      </div>
      
      <div id="message"></div>
      
      <button type="submit" id="reset-btn" disabled>Reset Password</button>
      
      <div class="switch-link">
        Remembered your password? <a href="login.html">Login</a>
      </div>
    </form>
  </div>

  <script>
    const form = document.getElementById('forgot-password-form');
    const emailInput = document.getElementById('forgot-email');
    const newPassword = document.getElementById('new-password');
    const confirmPassword = document.getElementById('confirm-password');
    const messageBox = document.getElementById('message');
    const submitBtn = document.getElementById('reset-btn');

    // Toggle password visibility
    document.querySelectorAll('.toggle-password').forEach(el => {
      el.addEventListener('click', () => {
        const target = document.getElementById(el.dataset.target);
        const icon = el.querySelector('ion-icon');
        const isPass = target.type === 'password';
        target.type = isPass ? 'text' : 'password';
        icon.setAttribute('name', isPass ? 'eye-outline' : 'eye-off-outline');
      });
    });

    // Password complexity check
    function validatePasswordComplexity(password) {
      return /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/.test(password);
    }

    // Real-time validation
    function validateForm() {
      const pass = newPassword.value.trim();
      const confirm = confirmPassword.value.trim();
      
      messageBox.className = 'error'; // Reset to error class

      if (pass && !validatePasswordComplexity(pass)) {
        messageBox.textContent = 'Min 8 chars: Upper, Lower, Num, & Special.';
        submitBtn.disabled = true;
        return;
      } 

      if (confirm && pass !== confirm) {
        messageBox.textContent = 'Passwords do not match.';
        submitBtn.disabled = true;
        return;
      }

      messageBox.textContent = '';
      submitBtn.disabled = !(pass && confirm && pass === confirm && validatePasswordComplexity(pass));
    }

    newPassword.addEventListener('input', validateForm);
    confirmPassword.addEventListener('input', validateForm);

    // Form submission
    form.addEventListener('submit', async e => {
      e.preventDefault();
      submitBtn.innerText = "Processing...";
      submitBtn.disabled = true;

      const email = emailInput.value.trim();
      const password = newPassword.value.trim();

      try {
        const response = await fetch('forgot-pass.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const result = await response.json();

        if (result.success) {
          messageBox.textContent = 'Password successfully reset!';
          messageBox.className = 'success';
          setTimeout(() => window.location.href = 'login.html', 2000);
        } else {
          messageBox.textContent = result.message || 'Error resetting password.';
          messageBox.className = 'error';
          submitBtn.innerText = "Reset Password";
          submitBtn.disabled = false;
        }
      } catch (error) {
        messageBox.textContent = 'Network error. Please try again.';
        messageBox.className = 'error';
        submitBtn.innerText = "Reset Password";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
